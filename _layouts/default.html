<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; script-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
    <meta name="referrer" content="strict-origin">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-header-inner">
          <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>
      </header>

      <main class="site-main">
        {% if page.title %}
        <h1 class="page-title">{{ page.title }}</h1>
        {% endif %}
        <article class="page-content">
          {{ content }}
        </article>

        <footer class="site-footer-note">
          <p>Questions, corrections, or suggestions? Visit the <a href="https://github.com/tamim/python-data-structures">GitHub repository</a> or explore <a href="https://tamimsthinklab.com/">Tamim's ThinkLab</a>.</p>
        </footer>
      </main>
    </div>
  </body>
</html>
